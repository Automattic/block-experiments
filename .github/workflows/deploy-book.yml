name: GitHub Pages

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v2
              with:
                  ref: master

            - name: Setup Node
              uses: actions/setup-node@v1
              with:
                  node-version: '12.x'

            - name: Install Dependencies
              run: yarn install

            - name: Build BlockBook
              run: yarn install && yarn blockbook:build -- --output-public-path=/block-experiments && cp dist/index.html dist/404.html

            - name: Deploy
              uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3.9.3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
